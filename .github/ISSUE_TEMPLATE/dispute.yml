name: "Dispute a Finding"
description: "For tool vendors or maintainers who believe an entry is inaccurate"
title: "[Dispute]: "
labels: ["dispute", "priority"]
body:
  - type: markdown
    attributes:
      value: |
        We take accuracy seriously. If you maintain or represent a tool listed here and believe our findings are incorrect, please use this template. Disputes are reviewed with priority.

        **Please note:** We will verify all claims independently. Providing evidence speeds up resolution.
  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      placeholder: "e.g., YourTool"
    validations:
      required: true
  - type: input
    id: your-role
    attributes:
      label: Your Relationship to the Tool
      description: "Maintainer, employee, security team, etc."
      placeholder: "e.g., Lead maintainer"
    validations:
      required: true
  - type: dropdown
    id: dispute-type
    attributes:
      label: What Is Inaccurate?
      multiple: true
      options:
        - "Default telemetry state is wrong"
        - "Analytics provider is incorrect"
        - "Disable method is wrong or incomplete"
        - "Data collection description is inaccurate"
        - "Code collection claim is wrong"
        - "Red flag is unfair or outdated"
        - "Tool is miscategorized"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: current-claim
    attributes:
      label: What We Currently Say
      description: "Quote the specific claim(s) you're disputing"
    validations:
      required: true
  - type: textarea
    id: correct-info
    attributes:
      label: What Is Actually Correct
      description: "Provide the accurate information with evidence"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: |
        Help us verify your correction. Any of:
        - Links to source code
        - Links to documentation or privacy policy
        - Commit hashes showing when behavior changed
        - Network traffic analysis
    validations:
      required: true
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Acknowledgment
      options:
        - label: "I understand that the maintainers will independently verify these claims before updating the entry"
          required: true
        - label: "I consent to this dispute being publicly visible on the issue tracker"
          required: true
